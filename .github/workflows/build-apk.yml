name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      run: |
        echo "ANDROID_HOME=$ANDROID_HOME"
        echo "sdk.dir=$ANDROID_HOME" > android-companion/local.properties
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
          "platform-tools" \
          "platforms;android-34" \
          "build-tools;34.0.0" \
          --sdk_root=$ANDROID_HOME || true

    - name: Setup sherpa-onnx AAR (download real .so for APK bundling)
      run: |
        echo "Downloading sherpa-onnx AAR to extract .so files..."
        mkdir -p android-companion/.maven-repo/com/k2fsa/sherpa/onnx/sherpa-onnx/1.12.38
        mkdir -p android-companion/app/src/main/jniLibs/arm64-v8a
        mkdir -p android-companion/app/src/main/assets/models
        
        if curl -fSLk --retry 3 --retry-delay 5 --connect-timeout 60 --max-time 300 \
          "https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.12.38/sherpa-onnx-1.12.38.aar" \
          -o /tmp/sherpa.aar 2>/dev/null; then
          
          echo "✓ Download complete: $(stat -c%s /tmp/sherpa.aar | numfmt --to=iec-i --suffix=B)"
          
          cd /tmp && unzip -q sherpa.aar -d sherpa_extracted
          
          cp /tmp/sherpa_extracted/classes.jar "$GITHUB_WORKSPACE/android-companion/.maven-repo/com/k2fsa/sherpa/onnx/sherpa-onnx/1.12.38/sherpa-onnx-1.12.38.jar"
          
          # Find and copy .so files
          SO_DIR="/tmp/sherpa_extracted"
          if [ -d "$SO_DIR/jni/arm64-v8a" ]; then
            cp "$SO_DIR/jni/arm64-v8a/"*.so "$GITHUB_WORKSPACE/android-companion/app/src/main/jniLibs/arm64-v8a/"
            echo "✓ Copied .so files:"
            ls -lh "$GITHUB_WORKSPACE/android-companion/app/src/main/jniLibs/arm64-v8a/"
          elif find "$SO_DIR" -name "*.so" -type f | head -1 | grep -q .; then
            find "$SO_DIR" -name "*.so" -type f -exec cp {} "$GITHUB_WORKSPACE/android-companion/app/src/main/jniLibs/arm64-v8a/" \;
            echo "✓ Copied .so files (from various dirs):"
            ls -lh "$GITHUB_WORKSPACE/android-companion/app/src/main/jniLibs/arm64-v8a/"
          else
            echo "⚠ No .so files found in AAR"
          fi
        else
          echo "⚠ Download failed, using stub JAR"
          echo '# Stub' > "$GITHUB_WORKSPACE/android-companion/.maven-repo/com/k2fsa/sherpa/onnx/sherpa-onnx/1.12.38/stub.txt"
        fi
        
        echo '# Placeholder for models' > "$GITHUB_WORKSPACE/android-companion/app/src/main/assets/models/README.txt"

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Generate Gradle Wrapper JAR
      run: |
        cd android-companion
        if command -v gradle &> /dev/null; then
          gradle wrapper --gradle-version 8.5
        else
          curl -fSLk --retry 3 https://services.gradle.org/distributions/gradle-8.5-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          /tmp/gradle-8.5/bin/gradle wrapper --gradle-version 8.5
        fi
        ls -la gradle/wrapper/gradle-wrapper.jar

    - name: Grant Gradle execute permission
      run: chmod +x gradlew
      working-directory: ./android-companion

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace
      working-directory: ./android-companion
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android-companion/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon
      working-directory: ./android-companion
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: app-release
        path: android-companion/app/build/outputs/apk/release/app-release.apk
        retention-days: 30
