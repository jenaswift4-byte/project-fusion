name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      run: |
        # GitHub Actions ubuntu-latest 已预装 Android SDK
        echo "ANDROID_HOME=$ANDROID_HOME"
        echo "sdk.dir=$ANDROID_HOME" > android-companion/local.properties
        # 安装所需 SDK 组件
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
          "platform-tools" \
          "platforms;android-34" \
          "build-tools;34.0.0" \
          --sdk_root=$ANDROID_HOME || true

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.5'

    - name: Grant Gradle execute permission
      run: chmod +x gradlew
      working-directory: ./android-companion

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace
      working-directory: ./android-companion
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android-companion/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon
      working-directory: ./android-companion
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: app-release
        path: android-companion/app/build/outputs/apk/release/app-release.apk
        retention-days: 30

    - name: Create GitHub Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          android-companion/app/build/outputs/apk/release/app-release.apk
          android-companion/app/build/outputs/apk/debug/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
