name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      run: |
        echo "ANDROID_HOME=$ANDROID_HOME"
        echo "sdk.dir=$ANDROID_HOME" > android-companion/local.properties
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
          "platform-tools" \
          "platforms;android-34" \
          "build-tools;34.0.0" \
          --sdk_root=$ANDROID_HOME || true

    - name: Setup Vosk AAR (download .so files for APK bundling)
      run: |
        echo "Downloading Vosk AAR from Maven Central..."
        mkdir -p android-companion/app/src/main/jniLibs/arm64-v8a

        if curl -fSL --retry 3 --retry-delay 5 --connect-timeout 60 --max-time 300 \
          "https://repo1.maven.org/maven2/com/alphacephei/vosk-android/0.3.47/vosk-android-0.3.47.aar" \
          -o /tmp/vosk.aar; then

          echo "✓ Download complete: $(stat -c%s /tmp/vosk.aar | numfmt --to=iec-i --suffix=B)"

          cd /tmp && unzip -q vosk.aar -d vosk_extracted

          # Find and copy .so files
          SO_DIR="/tmp/vosk_extracted"
          if [ -d "$SO_DIR/jni/arm64-v8a" ]; then
            cp "$SO_DIR/jni/arm64-v8a/"*.so "$GITHUB_WORKSPACE/android-companion/app/src/main/jniLibs/arm64-v8a/"
            echo "✓ Copied arm64-v8a .so files:"
            ls -lh "$GITHUB_WORKSPACE/android-companion/app/src/main/jniLibs/arm64-v8a/"
          fi
          if [ -d "$SO_DIR/jni/armeabi-v7a" ]; then
            mkdir -p "$GITHUB_WORKSPACE/android-companion/app/src/main/jniLibs/armeabi-v7a"
            cp "$SO_DIR/jni/armeabi-v7a/"*.so "$GITHUB_WORKSPACE/android-companion/app/src/main/jniLibs/armeabi-v7a/"
            echo "✓ Copied armeabi-v7a .so files:"
            ls -lh "$GITHUB_WORKSPACE/android-companion/app/src/main/jniLibs/armeabi-v7a/"
          fi
          # Also check for classes.jar for Java API
          if [ -f "$SO_DIR/classes.jar" ]; then
            echo "✓ Found classes.jar in AAR (Gradle @aar will handle this)"
          fi
        else
          echo "❌ AAR download failed - build will likely fail"
        fi

    - name: Download Vosk Chinese model
      run: |
        MODEL_DIR="$GITHUB_WORKSPACE/android-companion/app/src/main/assets/models"
        mkdir -p "$MODEL_DIR"

        echo "Downloading Vosk Chinese small model (~42MB)..."
        # Try alphacephei first, then GitHub mirror
        curl -fSL --retry 3 --retry-delay 5 --connect-timeout 60 --max-time 600 \
          "https://alphacephei.com/vosk/models/vosk-model-small-cn-0.22.zip" \
          -o "$MODEL_DIR/vosk-model-small-cn-0.22.zip" 2>/dev/null || \
        curl -fSL --retry 3 --retry-delay 5 --connect-timeout 60 --max-time 600 \
          "https://github.com/alphacep/vosk-api/releases/download/v0.22/vosk-model-small-cn-0.22.zip" \
          -o "$MODEL_DIR/vosk-model-small-cn-0.22.zip" 2>/dev/null || \
          echo "⚠ Model download failed - ASR will not work in the APK"

        if [ -f "$MODEL_DIR/vosk-model-small-cn-0.22.zip" ]; then
          echo "✓ Model downloaded: $(stat -c%s $MODEL_DIR/vosk-model-small-cn-0.22.zip | numfmt --to=iec-i --suffix=B)"
        fi
        ls -lh "$MODEL_DIR/"

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Generate Gradle Wrapper JAR
      run: |
        cd android-companion
        if command -v gradle &> /dev/null; then
          gradle wrapper --gradle-version 8.5
        else
          curl -fSLk --retry 3 https://services.gradle.org/distributions/gradle-8.5-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          /tmp/gradle-8.5/bin/gradle wrapper --gradle-version 8.5
        fi
        ls -la gradle/wrapper/gradle-wrapper.jar

    - name: Grant Gradle execute permission
      run: chmod +x gradlew
      working-directory: ./android-companion

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace
      working-directory: ./android-companion
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}
        JAVA_OPTS: -Xmx4096m -XX:+HeapDumpOnOutOfMemoryError

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android-companion/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon
      working-directory: ./android-companion
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}
        JAVA_OPTS: -Xmx4096m -XX:+HeapDumpOnOutOfMemoryError

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: app-release
        path: android-companion/app/build/outputs/apk/release/app-release.apk
        retention-days: 30
