name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      run: |
        echo "ANDROID_HOME=$ANDROID_HOME"
        echo "sdk.dir=$ANDROID_HOME" > android-companion/local.properties
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
          "platform-tools" \
          "platforms;android-34" \
          "build-tools;34.0.0" \
          --sdk_root=$ANDROID_HOME || true

    - name: Download sherpa-onnx AAR
      run: |
        mkdir -p android-companion/.maven-repo/com/k2fsa/sherpa/onnx/sherpa-onnx/1.12.38
        mkdir -p /tmp/sherpa-extract
        curl -fSL --retry 3 \
          "https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.12.38/sherpa-onnx-1.12.38.aar" \
          -o /tmp/sherpa.aar
        cd /tmp/sherpa-extract && unzip -q /tmp/sherpa.aar
        echo "AAR contents:"
        ls -la /tmp/sherpa-extract/
        cp /tmp/sherpa-extract/classes.jar "$GITHUB_WORKSPACE/android-companion/.maven-repo/com/k2fsa/sherpa/onnx/sherpa-onnx/1.12.38/sherpa-onnx-1.12.38.jar"
        cp -r /tmp/sherpa-extract/jni "$GITHUB_WORKSPACE/android-companion/.maven-repo/com/k2fsa/sherpa/onnx/sherpa-onnx/1.12.38/"
        cp /tmp/sherpa-extract/AndroidManifest.xml "$GITHUB_WORKSPACE/android-companion/.maven-repo/com/k2fsa/sherpa/onnx/sherpa-onnx/1.12.38/" || true
        printf '<?xml version="1.0" encoding="UTF-8"?>\n<project><modelVersion>4.0.0</modelVersion><groupId>com.k2fsa.sherpa.onnx</groupId><artifactId>sherpa-onnx</artifactId><version>1.12.38</version><packaging>jar</packaging></project>\n' > "$GITHUB_WORKSPACE/android-companion/.maven-repo/com/k2fsa/sherpa/onnx/sherpa-onnx/1.12.38/sherpa-onnx-1.12.38.pom"
        echo "AAR downloaded and extracted"

    - name: Copy AI models to assets
      run: |
        mkdir -p android-companion/app/src/main/assets/models
        curl -fSL --retry 3 \
          "https://github.com/k2-fsa/sherpa-onnx/releases/download/speaker-recongition-models/3dspeaker_speech_eres2net_base_sv_zh-cn_3dspeaker_16k.onnx" \
          -o android-companion/app/src/main/assets/models/3dspeaker_speech_eres2net_base_sv_zh-cn_3dspeaker_16k.onnx
        echo "Speaker model downloaded"
        mkdir -p /tmp/asr_model
        curl -fSL --retry 3 \
          "https://github.com/k2-fsa/sherpa-onnx/releases/download/asr-models/sherpa-onnx-streaming-zipformer-zh-int8-2025-06-30.tar.bz2" \
          -o /tmp/asr.tar.bz2
        tar xjf /tmp/asr.tar.bz2 -C /tmp/asr_model
        ls /tmp/asr_model/
        cp /tmp/asr_model/sherpa-onnx-streaming-zipformer-zh-int8-2025-06-30/encoder.int8.onnx \
           android-companion/app/src/main/assets/models/
        cp /tmp/asr_model/sherpa-onnx-streaming-zh-int8-2025-06-30/decoder.onnx \
           android-companion/app/src/main/assets/models/
        cp /tmp/asr_model/sherpa-onnx-streaming-zh-int8-2025-06-30/joiner.int8.onnx \
           android-companion/app/src/main/assets/models/
        cp /tmp/asr_model/sherpa-onnx-streaming-zh-int8-2025-06-30/tokens.txt \
           android-companion/app/src/main/assets/models/
        echo "ASR model downloaded"

    - name: Copy native libs (arm64-v8a only)
      run: |
        mkdir -p android-companion/app/src/main/jniLibs/arm64-v8a
        cp /tmp/sherpa-extract/jni/arm64-v8a/*.so \
           android-companion/app/src/main/jniLibs/arm64-v8a/ 2>/dev/null || true
        if [ -z "$(ls android-companion/app/src/main/jniLibs/arm64-v8a/*.so 2>/dev/null)" ]; then
          cp android-companion/.maven-repo/com/k2fsa/sherpa/onnx/sherpa-onnx/1.12.38/jni/arm64-v8a/*.so \
             android-companion/app/src/main/jniLibs/arm64-v8a/ 2>/dev/null || true
        fi
        ls -la android-companion/app/src/main/jniLibs/arm64-v8a/
        echo "Native libs copied"

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Generate Gradle Wrapper JAR
      run: |
        cd android-companion
        if command -v gradle &> /dev/null; then
          echo "Using system Gradle: $(gradle --version | head -1)"
          gradle wrapper --gradle-version 8.5
        else
          curl -fSL --retry 3 --retry-delay 5 \
            https://services.gradle.org/distributions/gradle-8.5-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          /tmp/gradle-8.5/bin/gradle wrapper --gradle-version 8.5
        fi
        ls -la gradle/wrapper/gradle-wrapper.jar

    - name: Grant Gradle execute permission
      run: chmod +x gradlew
      working-directory: ./android-companion

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace
      working-directory: ./android-companion
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android-companion/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon
      working-directory: ./android-companion
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: app-release
        path: android-companion/app/build/outputs/apk/release/app-release.apk
        retention-days: 30

    - name: Create GitHub Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          android-companion/app/build/outputs/apk/release/app-release.apk
          android-companion/app/build/outputs/apk/debug/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
