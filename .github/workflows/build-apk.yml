name: Build Fusion Companion APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'android-companion/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'android-companion/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Install required SDK components
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Generate Gradle Wrapper
        working-directory: android-companion
        run: |
          if [ ! -f gradlew ] || [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Generating Gradle wrapper..."
            gradle wrapper --gradle-version 8.5
          fi
          chmod +x gradlew

      - name: Build Debug APK
        working-directory: android-companion
        run: |
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: fusion-companion-debug
          path: android-companion/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Output build info
        if: always()
        working-directory: android-companion
        run: |
          echo "### Build Result" >> $GITHUB_STEP_SUMMARY
          if [ -f app/build/outputs/apk/debug/*.apk ]; then
            echo "✅ APK built successfully!" >> $GITHUB_STEP_SUMMARY
            ls -la app/build/outputs/apk/debug/*.apk >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          else
            echo "❌ APK build failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Download from: Actions → This run → Artifacts section" >> $GITHUB_STEP_SUMMARY
