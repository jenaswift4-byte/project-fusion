name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 9.0
        build-tools-version: 34.0.0
        target-version: 34
    
    - name: Grant execute permission for gradlew
      run: chmod +x android-companion/gradlew
      working-directory: ./
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug
      working-directory: ./android-companion
    
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android-companion/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
    
    - name: Build Release APK
      run: ./gradlew assembleRelease
      working-directory: ./android-companion
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: android-companion/app/build/outputs/apk/release/app-release.apk
        retention-days: 30
    
    - name: Create GitHub Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          android-companion/app/build/outputs/apk/release/app-release.apk
          android-companion/app/build/outputs/apk/debug/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
