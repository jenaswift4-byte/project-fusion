name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      run: |
        echo "ANDROID_HOME=$ANDROID_HOME"
        echo "sdk.dir=$ANDROID_HOME" > android-companion/local.properties
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
          "platform-tools" \
          "platforms;android-34" \
          "build-tools;34.0.0" \
          --sdk_root=$ANDROID_HOME || true

    - name: Download sherpa-onnx AAR (optional - fallback to stub)
      id: sherpa
      continue-on-error: true
      run: |
        set -x
        mkdir -p android-companion/.maven-repo/com/k2fsa/sherpa/onnx/sherpa-onnx/1.12.38
        mkdir -p android-companion/app/src/main/jniLibs/arm64-v8a
        mkdir -p android-companion/app/src/main/assets/models
        
        # Try to download AAR (~31MB)
        echo "Downloading sherpa-onnx AAR (~31MB)..."
        if curl -fSLk --retry 3 --retry-delay 5 --connect-timeout 30 --max-time 120 \
          "https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.12.38/sherpa-onnx-1.12.38.aar" \
          -o /tmp/sherpa.aar 2>/dev/null; then
          
          echo "✓ Download complete: $(stat -c%s /tmp/sherpa.aar | numfmt --to=iec-i --suffix=B)"
          
          # Extract
          cd /tmp && unzip -q sherpa.aar
          
          # Copy classes.jar for compilation
          cp /tmp/classes.jar "$GITHUB_WORKSPACE/android-companion/.maven-repo/com/k2fsa/sherpa/onnx/sherpa-onnx/1.12.38/sherpa-onnx-1.12.38.jar"
          
          # Copy only arm64-v8a .so (小米8 is arm64)
          cp /tmp/jni/arm64-v8a/*.so "$GITHUB_WORKSPACE/android-companion/app/src/main/jniLibs/arm64-v8a/"
          
          echo "✓ sherpa-onnx downloaded:"
          ls -lh android-companion/app/src/main/jniLibs/arm64-v8a/
          echo "sherpa_downloaded=true" >> $GITHUB_OUTPUT
        else
          echo "⚠ Download failed, creating stub classes.jar (runtime will load from files/lib/)"

          mkdir -p /tmp/stub/com/k2fsa/sherpa/onnx

          # OnlineRecognizer.java
          cat > /tmp/stub/com/k2fsa/sherpa/onnx/OnlineRecognizer.java << 'JAVAEOF'
package com.k2fsa.sherpa.onnx;
public class OnlineRecognizer {
  public OnlineRecognizer(Object config) {}
  public OnlineStream createStream() { return new OnlineStream(); }
  public boolean isReady(OnlineStream s) { return false; }
  public void decode(OnlineStream s) {}
  public Result getResult(OnlineStream s) { return new Result(); }
  public static class Result { public String getText() { return ""; } }
}
JAVAEOF

          # OnlineStream.java
          cat > /tmp/stub/com/k2fsa/sherpa/onnx/OnlineStream.java << 'JAVAEOF'
package com.k2fsa.sherpa.onnx;
public class OnlineStream {
  public void flush() {}
  public void acceptWaveform(float[] audio, int sampleRate) {}
}
JAVAEOF

          # OnlineRecognizerConfig.java
          cat > /tmp/stub/com/k2fsa/sherpa/onnx/OnlineRecognizerConfig.java << 'JAVAEOF'
package com.k2fsa.sherpa.onnx;
public class OnlineRecognizerConfig {
  public static Builder builder() { return new Builder(); }
  public static class Builder {
    public Builder setModel(Object m) { return this; }
    public Builder setTokens(String t) { return this; }
    public Builder setNumThreads(int n) { return this; }
    public Builder setDebug(boolean d) { return this; }
    public OnlineRecognizerConfig build() { return new OnlineRecognizerConfig(); }
  }
}
JAVAEOF

          # OnlineTransducerModelConfig.java
          cat > /tmp/stub/com/k2fsa/sherpa/onnx/OnlineTransducerModelConfig.java << 'JAVAEOF'
package com.k2fsa.sherpa.onnx;
public class OnlineTransducerModelConfig {
  public static Builder builder() { return new Builder(); }
  public static class Builder {
    public Builder setEncoder(String e) { return this; }
    public Builder setDecoder(String d) { return this; }
    public Builder setJoiner(String j) { return this; }
    public OnlineTransducerModelConfig build() { return new OnlineTransducerModelConfig(); }
  }
}
JAVAEOF

          # OnlineModelConfig.java (required by StreamingASRService)
          cat > /tmp/stub/com/k2fsa/sherpa/onnx/OnlineModelConfig.java << 'JAVAEOF'
package com.k2fsa.sherpa.onnx;
public class OnlineModelConfig {
  public static Builder builder() { return new Builder(); }
  public static class Builder {
    public Builder setTransducer(Object t) { return this; }
    public Builder setTokens(String t) { return this; }
    public OnlineModelConfig build() { return new OnlineModelConfig(); }
  }
}
JAVAEOF

          # SpeakerEmbeddingExtractor.java (required by SpeakerIdentifier)
          cat > /tmp/stub/com/k2fsa/sherpa/onnx/SpeakerEmbeddingExtractor.java << 'JAVAEOF'
package com.k2fsa.sherpa.onnx;
public class SpeakerEmbeddingExtractor {
  public SpeakerEmbeddingExtractor(Object config) {}
  public float[] createEmbedding(String wavPath) { return new float[512]; }
  public int getEmbeddingSize() { return 512; }
}
JAVAEOF

          # SpeakerEmbeddingExtractorConfig.java
          cat > /tmp/stub/com/k2fsa/sherpa/onnx/SpeakerEmbeddingExtractorConfig.java << 'JAVAEOF'
package com.k2fsa.sherpa.onnx;
public class SpeakerEmbeddingExtractorConfig {
  public static Builder builder() { return new Builder(); }
  public static class Builder {
    public Builder setModel(String m) { return this; }
    public Builder setNumThreads(int n) { return this; }
    public SpeakerEmbeddingExtractorConfig build() { return new SpeakerEmbeddingExtractorConfig(); }
  }
}
JAVAEOF

          # SpeakerEmbeddingManager.java
          cat > /tmp/stub/com/k2fsa/sherpa/onnx/SpeakerEmbeddingManager.java << 'JAVAEOF'
package com.k2fsa.sherpa.onnx;
import java.util.Map;
public class SpeakerEmbeddingManager {
  public SpeakerEmbeddingManager(int numThreads) {}
  public int addSpeaker(String name, float[] embedding) { return 0; }
  public int getSpeakerId(String name) { return 0; }
  public String getSpeakerName(int id) { return ""; }
  public int getNumSpeakers() { return 0; }
  public void dump(String path) {}
  public void load(String path) {}
}
JAVAEOF

          echo "✓ Stub JAR created (runtime will load .so from files/lib/)"
          echo "sherpa_downloaded=false" >> $GITHUB_OUTPUT

          # Compile stub classes
          cd /tmp/stub
          javac -d . com/k2fsa/sherpa/onnx/*.java
          jar cf "$GITHUB_WORKSPACE/android-companion/.maven-repo/com/k2fsa/sherpa/onnx/sherpa-onnx/1.12.38/sherpa-onnx-1.12.38.jar" com/
        fi
        
        # Generate POM
        printf '<?xml version="1.0" encoding="UTF-8"?>\n<project><modelVersion>4.0.0</modelVersion><groupId>com.k2fsa.sherpa.onnx</groupId><artifactId>sherpa-onnx</artifactId><version>1.12.38</version><packaging>jar</packaging></project>\n' > "$GITHUB_WORKSPACE/android-companion/.maven-repo/com/k2fsa/sherpa/onnx/sherpa-onnx/1.12.38/sherpa-onnx-1.12.38.pom"
        
        # Create placeholder for models (will be pushed from PC)
        echo "# Models will be pushed from PC after install" > android-companion/app/src/main/assets/models/README.txt
        
        echo "::notice::sherpa-onnx: $([ -f /tmp/sherpa.aar ] && echo 'downloaded' || echo 'stub, will load from files/lib/')"

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Generate Gradle Wrapper JAR
      run: |
        cd android-companion
        if command -v gradle &> /dev/null; then
          gradle wrapper --gradle-version 8.5
        else
          curl -fSLk --retry 3 https://services.gradle.org/distributions/gradle-8.5-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          /tmp/gradle-8.5/bin/gradle wrapper --gradle-version 8.5
        fi
        ls -la gradle/wrapper/gradle-wrapper.jar

    - name: Grant Gradle execute permission
      run: chmod +x gradlew
      working-directory: ./android-companion

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace
      working-directory: ./android-companion
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android-companion/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon
      working-directory: ./android-companion
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: app-release
        path: android-companion/app/build/outputs/apk/release/app-release.apk
        retention-days: 30
