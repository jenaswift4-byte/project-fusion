# Project Fusion v2.0 完整配置
# 修改此文件以自定义行为

# ═══ 基础配置 ═══
scrcpy:
  path: "C:\\Users\\wang\\Desktop\\scrcpy-win64-v3.3.4"
  window_title: "Phone"
  x: 1440
  y: 0
  width: 480
  height: 1080
  max_fps: 60
  bit_rate: "8M"
  always_on_top: true
  no_border: true
  turn_screen_off: true
  stay_awake: true

adb:
  path: "C:\\Users\\wang\\Desktop\\scrcpy-win64-v3.3.4\\adb.exe"
  wifi_auto_connect: true
  wifi_port: 5555

clipboard:
  sync_to_windows: true
  sync_to_phone: true
  image_save_dir: "D:\\Fusion\\Clipboard"
  auto_open_urls: true
  poll_interval_ms: 1000
  max_history: 20

notification:
  show_toast: true
  auto_focus_scrcpy: true
  poll_interval_ms: 2000
  ignore_packages:
    - com.android.systemui
    - com.android.launcher
    - android
    - com.android.packageinstaller

telephony:
  show_call_popup: true
  auto_focus_scrcpy: true
  poll_interval_ms: 2000

file:
  push_target: "/sdcard/Download/"
  pull_target: "C:\\Users\\wang\\Downloads"

kde_connect:
  enabled: false
  device_id: "auto"
  cli_path: "kdeconnect-cli"
  poll_interval_ms: 1000

input_leap:
  enabled: false
  config_path: ""

autostart:
  enabled: false

tray:
  enabled: true

# ═══ 手机作为 PC 外设扩展 ═══
battery:
  poll_interval_ms: 30000
  low_threshold: 20
  critical_threshold: 10

screenshot:
  enabled: true
  save_dir: "D:\\Fusion\\Screenshots"
  auto_clipboard: true
  format: "png"

sms:
  enabled: true
  poll_interval_ms: 5000
  max_display: 20

handoff:
  enabled: true
  clipboard_urls: true
  open_on_phone: true

audio:
  enabled: true
  mic_enabled: false
  mic_save_dir: "D:\\Fusion\\Audio"
  scrcpy_audio: false

hotkeys:
  enabled: true
  prefix: "win+shift"

dnd:
  enabled: true
  check_interval_ms: 2000
  bypass_packages:
    - "com.tencent.mobileqq"
    - "com.whatsapp"

proximity:
  enabled: false
  device_mac: ""
  device_name: ""
  rssi_threshold: -10
  auto_connect: true
  auto_disconnect: false

paths:
  clipboard_images: "D:\\Fusion\\Clipboard"
  logs: "D:\\Fusion\\Logs"

# ═══════════════════════════════════════════════════════════════════
# ═══ Project Fusion v2.0 新增配置 ═══════════════════════════════════
# ═══════════════════════════════════════════════════════════════════

# ═══ AI推理配置 ═══
ai:
  enabled: true
  default_model: "qwen2-1.5b-chat-q4"
  auto_select: true
  models:
    qwen2-1.5b-chat-q4:
      path_android: "/data/local/llm/qwen2-1.5b-q4_k_m.gguf"
      path_pc: "C:\\Models\\qwen2-1.5b-q4_k_m.gguf"
      backend: "llama.cpp"
      max_context: 8192
      capabilities:
        - chat
        - translate
        - summarize
    phi-2-q4:
      path_android: "/data/local/llm/phi-2-q4.gguf"
      backend: "llama.cpp"
      max_context: 2048
      capabilities:
        - chat
        - code
    qwen2.5-7b:
      path_pc: "C:\\Models\\qwen2.5-7b-q4_k_m.gguf"
      backend: "ollama"
      max_context: 16384
      capabilities:
        - chat
        - code
        - reasoning

# ═══ 手机运行PC应用配置 (Phone as Display) ═══
phone_as_display:
  enabled: true

  # Sunshine配置
  sunshine:
    auto_start: true
    port: 47984
    api_port: 47990
    apps:
      - id: "chrome"
        name: "Google Chrome"
        exe: "C:\\Program Files\\Google\\Chrome\\Application\\chrome.exe"
        args: ["--new-window"]
      - id: "vscode"
        name: "Visual Studio Code"
        exe: "C:\\Users\\wang\\AppData\\Local\\Programs\\Microsoft VS Code\\Code.exe"
      - id: "file_explorer"
        name: "File Explorer"
        exe: "C:\\Windows\\explorer.exe"
        args: ["::{20D04FE0-3AEA-1069-A2D8-08002B30309D}"]
      - id: "notepad"
        name: "Notepad"
        exe: "C:\\Windows\\System32\\notepad.exe"
      - id: "powershell"
        name: "PowerShell"
        exe: "C:\\Windows\\System32\\WindowsPowerShell\\v1.0\\powershell.exe"
      - id: "cmd"
        name: "Command Prompt"
        exe: "C:\\Windows\\System32\\cmd.exe"

  # 传输配置
  transport:
    preferred: "sunshine"
    usb_priority: true
    adaptive_bitrate: true

  # 编码配置
  encoding:
    hardware_accel: "nvenc"
    bitrate:
      usb: "50M"
      wifi6: "30M"
      wifi5: "20M"
      battery_saving: "5M"
    fps:
      usb: 120
      wifi6: 60
      wifi5: 60
      battery_saving: 30

  # 触摸配置
  touch:
    enabled: true
    sensitivity: 1.0
    tap: "left_click"
    double_tap: "left_double_click"
    long_press: "right_click"
    swipe_threshold: 50
    edge_gestures:
      left_edge: "windows_key"
      right_edge: "alt_tab"
      top_edge: "alt_f4"
      bottom_edge: "show_taskbar"
    app_overrides:
      chrome:
        swipe_left: "alt_left"
        swipe_right: "alt_right"
      vscode:
        swipe_left: "ctrl_pageup"
        swipe_right: "ctrl_pagedn"

# ═══ PC运行手机应用配置 ═══
pc_running_phone_apps:
  enabled: true
  virtual_display:
    width: 1080
    height: 1920
    dpi: 420
  scrcpy:
    show_in_taskbar: true
    window_decorations: false
  apps:
    - id: "douyin"
      name: "抖音"
      package: "com.ss.android.ugc.aweme"
    - id: "bilibili"
      name: "哔哩哔哩"
      package: "tv.danmaku.bili"
    - id: "wechat"
      name: "微信"
      package: "com.tencent.mm"
    - id: "qq"
      name: "QQ"
      package: "com.tencent.mobileqq"
    - id: "music"
      name: "网易云音乐"
      package: "com.netease.cloudmusic"
    - id: "taobao"
      name: "淘宝"
      package: "com.taobao.taobao"
    - id: "jingdong"
      name: "京东"
      package: "com.jingdong.app.mall"
    - id: "dingding"
      name: "钉钉"
      package: "com.alibaba.android.rimet"

# ═══ 分布式计算配置 ═══
distributed:
  enabled: true
  scheduler:
    strategy: "compute_score"
    check_interval_seconds: 5
    migration_threshold: 30
  offload:
    enabled: true
    ai_tasks: true
    encoding_tasks: true

# ═══ 传感器健康配置 ═══
sensors:
  health_check:
    enabled: true
    interval_hours: 24
    auto_calibrate: false
  thresholds:
    noise:
      light: 50.0
      accelerometer: 0.5
    drift:
      light: 100.0
      accelerometer: 1.0

# ═══ 环境感知配置 ═══
environment:
  enabled: true
  sensors:
    - light
    - proximity
    - noise
    - wifi_scan
    - bluetooth
  home_assistant:
    enabled: false
    url: "http://homeassistant:8123"
    token: ""
  mqtt:
    broker: "mqtt://homeassistant:1883"
    topic_prefix: "fusion"

# ═══ 网络配置 ═══
network:
  lan:
    enabled: true
    auto_discover: true
  tunnel:
    enabled: false
    provider: "wireguard"
    wireguard_config: ""
    tailscale_auth_key: ""

# ═══ 省电配置 ═══
power_saving:
  auto_enabled: true
  battery_threshold: 30
  reduce_fps_when_low: true
  reduce_bitrate_when_low: true
  auto_adjust_refresh_rate: true
