# Project Fusion 完整配置
# 修改此文件以自定义行为

scrcpy:
  path: "C:\\Users\\wang\\Desktop\\scrcpy-win64-v3.3.4"
  window_title: "Phone"
  x: 1440
  y: 0
  width: 480
  height: 1080
  max_fps: 60
  bit_rate: "8M"
  always_on_top: true
  no_border: true
  turn_screen_off: true
  stay_awake: true

adb:
  path: "C:\\Users\\wang\\Desktop\\scrcpy-win64-v3.3.4\\adb.exe"
  wifi_auto_connect: true
  wifi_port: 5555

clipboard:
  sync_to_windows: true
  sync_to_phone: true
  image_save_dir: "D:\\Fusion\\Clipboard"
  auto_open_urls: true
  poll_interval_ms: 1000
  max_history: 20

notification:
  show_toast: true
  auto_focus_scrcpy: true
  poll_interval_ms: 2000
  ignore_packages:
    - com.android.systemui
    - com.android.launcher
    - android
    - com.android.packageinstaller

telephony:
  show_call_popup: true
  auto_focus_scrcpy: true
  poll_interval_ms: 2000

file:
  push_target: "/sdcard/Download/"
  pull_target: "C:\\Users\\wang\\Downloads"

kde_connect:
  enabled: false          # 设为 true 启用 KDE Connect 集成
  device_id: "auto"       # "auto" 自动发现，或填入设备 ID
  cli_path: "kdeconnect-cli"
  poll_interval_ms: 1000

input_leap:
  enabled: false          # 设为 true 启用键鼠跨屏
  config_path: ""         # 留空使用默认路径

autostart:
  enabled: false          # 开机自启 (用 --autostart 命令注册)

tray:
  enabled: true           # 系统托盘图标

# ═══ 手机作为 PC 外设扩展 ═══

battery:
  poll_interval_ms: 30000   # 电池轮询间隔 (毫秒)
  low_threshold: 20         # 低电量提醒阈值 (%)
  critical_threshold: 10    # 严重低电阈值 (%)

screenshot:
  enabled: true             # 快捷截图
  save_dir: "D:\\Fusion\\Screenshots"
  auto_clipboard: true      # 截图自动放入 PC 剪贴板
  format: "png"             # png 或 jpg

sms:
  enabled: true             # 短信收发
  poll_interval_ms: 5000    # ADB 轮询间隔 (WS 模式下无效)
  max_display: 20           # 最大显示条数

handoff:
  enabled: true             # 链接接力 (Handoff)
  clipboard_urls: true      # 剪贴板 URL 自动接力
  open_on_phone: true       # PC 链接自动在手机打开

audio:
  enabled: true             # 音频流转
  mic_enabled: false        # 手机当麦克风 (默认关，延迟高)
  mic_save_dir: "D:\\Fusion\\Audio"
  scrcpy_audio: false       # Scrcpy 音频转发 (需重启 Scrcpy)

hotkeys:
  enabled: true             # 全局热键
  prefix: "win+shift"       # 热键前缀

dnd:
  enabled: true             # 智能免打扰
  check_interval_ms: 2000   # 全屏检测间隔
  bypass_packages:          # 免打扰时仍弹出的包名 (紧急通知)
    - "com.tencent.mobileqq"
    - "com.whatsapp"

proximity:
  enabled: false            # 近场自动连接 (需蓝牙)
  device_mac: ""            # 手机蓝牙 MAC 地址
  device_name: ""           # 手机蓝牙名称
  rssi_threshold: -10       # RSSI 阈值
  auto_connect: true        # 靠近时自动连接
  auto_disconnect: false    # 离开时自动断开

paths:
  clipboard_images: "D:\\Fusion\\Clipboard"
  logs: "D:\\Fusion\\Logs"
